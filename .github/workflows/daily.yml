name: Update daily image

on:
  schedule:
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Datum bestimmen
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Bild setzen
        run: |
          if [ -f "images/$DATE.jpg" ]; then
            cp "images/$DATE.jpg" current.jpg
          else
            echo "Kein Bild für heute gefunden: images/$DATE.jpg"
            exit 1
          fi

      - name: Committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add current.jpg
          git commit -m "Update image for $DATE" || echo "Keine Änderungen"

      - name: Pushen
        run: git push origin main
