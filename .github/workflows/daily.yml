name: Update daily image

on:
  schedule:
    - cron: "5 6 * * *"   # täglich um 06:05 UTC
  workflow_dispatch:

jobs:
  update-image:
    runs-on: ubuntu-latest

    steps:
      - name: Repo klonen
        uses: actions/checkout@v4

      - name: Datum bestimmen
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Bild setzen
        run: |
          if [ -f "images/$DATE.jpg" ]; then
            cp images/$DATE.jpg current.jpg
          else
            echo "Kein Bild für heute gefunden"
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add current.jpg
          git commit -m "Update image for $DATE" || echo "No changes"
          git push
