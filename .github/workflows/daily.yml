name: Update daily image

on:
  workflow_dispatch:
  schedule:
    - cron: "5 6 * * *"

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Datum bestimmen
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Quelldatei prüfen
        run: |
          echo "Heute: $DATE"
          ls -l images
          file "images/$DATE.jpg"
          wc -c "images/$DATE.jpg"

      - name: Bild kopieren
        run: cp "images/$DATE.jpg" current.jpg

      - name: Kopie prüfen
        run: |
          ls -l current.jpg
          file current.jpg
          wc -c current.jpg
          sha256sum "images/$DATE.jpg" current.jpg

      - name: Committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add current.jpg
          git commit -m "Update image for $DATE" || echo "Keine Änderungen"

      - name: Pushen
        run: git push origin main
