name: Update daily image

on:
  schedule:
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Datum bestimmen
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Dateiinfos vorher anzeigen
        run: |
          echo "Heute: $DATE"
          ls -l
          ls -l images || true
          file "images/$DATE.jpg" || true
          wc -c "images/$DATE.jpg" || true

      - name: Bild kopieren
        run: |
          cp "images/$DATE.jpg" current.jpg

      - name: Dateiinfos nachher anzeigen
        run: |
          ls -l current.jpg
          file current.jpg || true
          wc -c current.jpg || true
          sha256sum "images/$DATE.jpg" current.jpg || true

      - name: Committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status
          git add current.jpg
          git commit -m "Update image for $DATE" || echo "Keine Änderungen"

      - name: Pushen
        run: git push origin main
        run: git push origin main
